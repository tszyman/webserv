server {
    listen 8080;
    server_name localhost;

    location / {
        root YoupiBanane;
        allowed_methods GET;
    }

    location /post_body {
        root YoupiBanane;
        allowed_methods POST;
        client_max_body_size 100;
    }

    location /directory/ {
        root YoupiBanane;
        allowed_methods GET;
        index youpi.bad_extension;
    }

    # Extension-based CGI rules are evaluated independently of URI prefix
    # matching, so POST /youpi.bla runs ./cgi_test.
    location .bla {
        root YoupiBanane;
        allowed_methods POST;
        cgi_extension .bla;
        cgi_path ./cgi_test;
    }
}
