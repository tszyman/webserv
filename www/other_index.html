<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other index page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .badge {
            display: inline-block;
            background-color: #0284c7;
            color: #ffffff;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            letter-spacing: 0.05em;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #334155;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Other index page</h1>
        <p>Welcome! This server is powered by <code>webserv</code>, a custom C++98 HTTP server implementation.</p>
        <span class="badge">HTTP/1.1 • Status 200 OK</span>
        <footer>
            Served by webserv
        </footer>
    </main>
</body>
</html>
